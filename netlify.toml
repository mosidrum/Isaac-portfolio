[build]
  command = "rm -rf node_modules package-lock.json && npm install && npm rebuild sharp && npm run build:prod"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  SHARP_IGNORE_GLOBAL_LIBVIPS = "1"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"